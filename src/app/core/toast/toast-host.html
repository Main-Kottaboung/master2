<div class="fixed top-4 right-4 z-50 space-y-2 w-[min(92vw,24rem)]">
  @for (toast of toastService.toasts(); track toast.id) {
    <div
      class="rounded-xl border bg-white shadow-lg p-4"
      [class.border-emerald-200]="toast.kind === 'success'"
      [class.border-rose-200]="toast.kind === 'error'"
      [class.border-sky-200]="toast.kind === 'info'"
    >
      <div class="flex items-start justify-between gap-3">
        <div>
          <p
            class="text-sm font-semibold"
            [class.text-emerald-700]="toast.kind === 'success'"
            [class.text-rose-700]="toast.kind === 'error'"
            [class.text-sky-700]="toast.kind === 'info'"
          >
            {{ toast.title }}
          </p>
          @if (toast.message) {
            <p class="text-sm text-slate-600 mt-1">{{ toast.message }}</p>
          }
        </div>
        <button type="button" (click)="toastService.dismiss(toast.id)" class="text-slate-400 hover:text-slate-700">×</button>
      </div>
    </div>
  }
</div>
