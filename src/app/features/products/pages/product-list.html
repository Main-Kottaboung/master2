<div class="space-y-6">
  <!-- Filters -->
  <div class="bg-white p-4 rounded-lg border">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <!-- Search -->
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-2">Search</label>
        <input
          type="text"
          [(ngModel)]="searchQuery"
          placeholder="Search products..."
          class="w-full px-3 py-2 border rounded-lg bg-white text-sm focus:outline-none focus:ring-2 focus:ring-slate-900"
        />
      </div>

      <!-- Category Filter -->
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-2">Category</label>
        <select
          [(ngModel)]="selectedCategory"
          class="w-full px-3 py-2 border rounded-lg bg-white text-sm focus:outline-none focus:ring-2 focus:ring-slate-900"
        >
          <option [ngValue]="null">All Categories</option>
          <option *ngFor="let cat of categories()" [ngValue]="cat">{{ cat }}</option>
        </select>
      </div>
    </div>

    <div class="mt-4 flex gap-2">
      <button
        (click)="clearFilters()"
        class="px-4 py-2 text-sm font-medium text-slate-700 bg-slate-100 rounded-lg hover:bg-slate-200 transition-colors"
      >
        Clear Filters
      </button>
      <div class="text-sm text-slate-600 flex items-center">
        {{ products().length }} product{{ products().length !== 1 ? 's' : '' }} found
      </div>
    </div>
  </div>

  <!-- Products Grid -->
  <div *ngIf="products().length > 0; else noResults" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
    <app-product-card *ngFor="let product of products()" [product]="product"></app-product-card>
  </div>

  <!-- No Results -->
  <ng-template #noResults>
    <div class="text-center py-12">
      <div class="text-slate-500 text-lg">No products found</div>
      <button
        (click)="clearFilters()"
        class="mt-4 px-4 py-2 text-sm font-medium text-slate-700 bg-slate-100 rounded-lg hover:bg-slate-200 transition-colors"
      >
        Clear Filters
      </button>
    </div>
  </ng-template>
</div>
