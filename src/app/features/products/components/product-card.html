<a [routerLink]="['/shop', product().slug]" class="block group h-full">
  <article class="h-full border border-slate-200 rounded-xl overflow-hidden bg-white hover:shadow-lg transition-shadow duration-200">
    <!-- Image -->
    <div class="relative w-full h-52 bg-slate-100 overflow-hidden">
      <img 
        [src]="product().image" 
        [alt]="product().name"
        class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"
      />
      @if (!product().inStock) {
      <div class="absolute inset-0 bg-black/50 flex items-center justify-center">
        <span class="text-white font-semibold">Out of Stock</span>
      </div>
      }
    </div>

    <!-- Content -->
    <div class="p-4 flex flex-col h-[calc(100%-13rem)]">
      <div class="text-[11px] font-medium text-slate-500 uppercase tracking-wide">{{ product().category }}</div>
      <h3 class="text-base font-semibold text-slate-900 mt-1 line-clamp-2">{{ product().name }}</h3>
      <p class="text-sm text-slate-600 mt-2 line-clamp-2">{{ product().description }}</p>

      <!-- Price -->
      <div class="mt-3 flex items-baseline gap-2">
        <span class="text-xl font-bold text-slate-900">${{ product().price.toFixed(2) }}</span>
      </div>

      <!-- CTA -->
      <div class="mt-auto pt-4">
        <span class="inline-flex items-center justify-center w-full px-3 py-2 text-sm font-medium rounded-lg bg-slate-900 text-white group-hover:bg-slate-800 transition-colors">
          View details
        </span>
      </div>
    </div>
  </article>
</a>
