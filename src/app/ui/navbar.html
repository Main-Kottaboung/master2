<header class="bg-white border-b">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-16">
      <div class="flex items-center gap-4">
        <a class="text-xl font-semibold text-slate-900" routerLink="/">ShopBrand</a>
      </div>

      <nav class="hidden md:flex items-center gap-4 text-sm">
        <a routerLink="/shop" class="text-slate-700 hover:text-slate-900">Shop</a>
        <a routerLink="/cart" class="text-slate-700 hover:text-slate-900 inline-flex items-center gap-2">
          <span>Cart</span>
          @if (authService.isAuthenticated()) {
            <span class="inline-flex min-w-5 h-5 px-1 rounded-full bg-slate-900 text-white text-[11px] items-center justify-center">
              {{ cartService.itemCount() }}
            </span>
          }
        </a>
        <a *ngIf="authService.isAuthenticated()" routerLink="/account" class="text-slate-700 hover:text-slate-900">Account</a>
      </nav>

      <div class="flex items-center gap-3">
        <button class="md:hidden p-2 rounded-md text-slate-700 hover:bg-slate-100">☰</button>

        <!-- Auth Section -->
        <ng-container *ngIf="authService.isAuthenticated(); else notAuth">
          <div class="flex items-center gap-2 text-sm">
            <span class="hidden sm:inline text-slate-700">{{ authService.user()?.email }}</span>
            <button
              (click)="logout()"
              class="px-3 py-2 rounded-md bg-slate-100 text-slate-900 hover:bg-slate-200 text-xs font-medium transition-colors"
            >
              Logout
            </button>
          </div>
        </ng-container>

        <ng-template #notAuth>
          <a routerLink="/auth/login" class="px-3 py-2 rounded-md bg-slate-900 text-white text-sm">Sign in</a>
        </ng-template>
      </div>
    </div>
  </div>
</header>
